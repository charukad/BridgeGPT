<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgeGPT Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #0f111a;
            --bg-panel: #1e1e2f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --user-bubble: #6366f1;
            --bot-bubble: #2d2d3f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at top left, #1e1b4b, #0f111a);
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(30, 30, 47, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-status {
            font-size: 0.85rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .settings-bar {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .settings-bar input[type="password"] {
            flex: 1;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .settings-bar input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            min-height: 50px;
            max-height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 14px 18px;
            font-size: 0.95rem;
            resize: none;
            overflow-y: auto;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.5;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .send-btn:hover {
            background: var(--primary-hover);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            margin-left: 2px;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 18px;
            background: var(--bot-bubble);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: none;
            gap: 6px;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Markdown formatting in messages */
        .message pre {
            background: #0d0d14;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #2a2a3e;
        }

        .message code {
            font-family: monospace;
            font-size: 0.9em;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .message pre code {
            background: transparent;
            padding: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>🌉 BridgeGPT</h1>
            <div class="header-status">
                <div class="status-dot"></div> API Ready
            </div>
        </div>

        <div class="settings-bar">
            <div class="input-group">
                <label for="apiKey">API Key:</label>
                <input type="password" id="apiKey" value="1234567890" placeholder="Enter your BridgeGPT API Key">
            </div>
            <div class="input-group" style="flex: 0 0 auto;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="streamToggle" checked> Stream output
                </label>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                Hello! I'm connected to your local BridgeGPT instance. Ensure the server is running on
                <code>http://localhost:3000</code> and drop a message below to test it! 🚀
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="input-area">
            <textarea class="chat-input" id="messageInput" placeholder="Message BridgeGPT..." rows="1"
                oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 200) + 'px'"></textarea>
            <button class="send-btn" id="sendBtn" title="Send message">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const streamToggle = document.getElementById('streamToggle');
        const typingIndicator = document.getElementById('typingIndicator');

        // Allow sending with Enter key (Shift+Enter for new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function appendMessage(content, role) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            // Very simple markdown-like formatting for code blocks
            let formattedContent = content
                .replace(/</g, "&lt;").replace(/>/g, "&gt;") // Escape HTML
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>') // Code blocks
                .replace(/`([^`]+)`/g, '<code>$1</code>') // Inline code
                .replace(/\n/g, '<br>'); // Newlines

            msgDiv.innerHTML = formattedContent;

            chatArea.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
            return msgDiv;
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            const useStream = streamToggle.checked;

            if (!content) return;
            if (!apiKey) {
                appendMessage("❌ Error: Please enter your API Key in the settings bar above.", 'error');
                return;
            }

            // UI Updates
            messageInput.value = '';
            messageInput.style.height = '50px';
            sendBtn.disabled = true;
            appendMessage(content, 'user');
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                if (useStream) {
                    await handleStreaming(content, apiKey);
                } else {
                    await handleStandard(content, apiKey);
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage(`❌ Connection Error: Ensure backend is running. Details: ${error.message}`, 'error');
            } finally {
                typingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        async function handleStandard(content, apiKey) {
            const response = await fetch('http://localhost:3000/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    messages: [{ role: 'user', content }],
                    stream: false
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || 'Unknown API error');
            }

            appendMessage(data.choices[0].message.content, 'assistant');
        }

        async function handleStreaming(content, apiKey) {
            const response = await fetch('http://localhost:3000/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    messages: [{ role: 'user', content }],
                    stream: true
                })
            });

            if (!response.ok) {
                const text = await response.text();
                try {
                    const data = JSON.parse(text);
                    throw new Error(data.error?.message || 'Unknown API error');
                } catch {
                    throw new Error(`HTTP Error ${response.status}: ${text}`);
                }
            }

            typingIndicator.style.display = 'none';
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            // Create a message bubble that we will update iteratively
            const msgDiv = document.createElement('div');
            msgDiv.className = `message assistant`;
            chatArea.insertBefore(msgDiv, typingIndicator);

            let fullText = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.replace('data: ', '').trim();
                        if (dataStr === '[DONE]') continue;
                        if (!dataStr) continue;

                        try {
                            const parsed = JSON.parse(dataStr);

                            // Check if an error was streamed
                            if (parsed.error) {
                                throw new Error(parsed.error.message);
                            }

                            if (parsed.choices && parsed.choices[0].delta.content) {
                                fullText += parsed.choices[0].delta.content;

                                // Clean rendering with basic markdown safety
                                let formattedContent = fullText
                                    .replace(/</g, "&lt;").replace(/>/g, "&gt;") // Escape HTML
                                    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>') // Code blocks
                                    .replace(/`([^`]+)`/g, '<code>$1</code>') // Inline code
                                    .replace(/\n/g, '<br>'); // Newlines

                                msgDiv.innerHTML = formattedContent;
                                scrollToBottom();
                            }
                        } catch (e) {
                            console.error('Error parsing SSE chunk:', e, dataStr);
                        }
                    }
                }
            }
        }
    </script>
</body>

</html>
